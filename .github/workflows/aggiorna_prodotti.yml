name: Scraping Automatico

on:
  schedule:
    - cron: '0 9 * * *' # Parte ogni mattina alle 09:00
  workflow_dispatch:      # Ti permette di avviarlo a mano per testare

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codice
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Installazione librerie
        run: pip install requests beautifulsoup4 supabase

      - name: Esecuzione Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper.py
