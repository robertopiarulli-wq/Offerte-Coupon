<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PodoCatalogo Pro - Podopiù</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary-color: #2c3e50; /* Blu scuro professionale */
            --accent-color: #3498db;  /* Blu brillante */
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --gray-light: #ecf0f1;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 280px;
            background-color: var(--card-bg);
            padding: 20px;
            border-right: 1px solid var(--gray-light);
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        #logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        #logo-container h1 {
            color: var(--primary-color);
            margin: 0;
            font-size: 1.5rem;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .filter-group h3 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--primary-color);
        }

        .filter-btn {
            background: none;
            border: 1px solid var(--gray-light);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: var(--transition);
            color: var(--text-color);
        }

        .filter-btn:hover, .filter-btn.active {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        #search-input {
            padding: 12px;
            border: 1px solid var(--gray-light);
            border-radius: 8px;
            outline: none;
            transition: var(--transition);
        }

        #search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        /* --- MAIN CONTENT --- */
        #main-content {
            flex: 1;
            padding: 30px;
        }

        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        #header h2 {
            margin: 0;
            color: var(--primary-color);
        }

        #product-count {
            color: #7f8c8d;
        }

        /* --- GRID --- */
        #product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        /* --- PRODUCT CARD --- */
        .product-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            overflow: hidden;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* EFFETTO HOVER (Grigio/Scala/Ombra) */
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid var(--accent-color);
        }

        .card-img-container {
            width: 100%;
            height: 250px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fff;
            position: relative;
        }

        .product-card img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: var(--transition);
        }

        /* Effetto scala sull'immagine */
        .product-card:hover img {
            transform: scale(1.05);
        }

        .card-body {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .product-code {
            font-size: 0.85rem;
            color: var(--accent-color);
            font-weight: bold;
        }

        .product-name {
            font-size: 1.1rem;
            color: var(--primary-color);
            margin: 0;
            line-height: 1.3;
        }

        .product-category {
            font-size: 0.9rem;
            color: #7f8c8d;
            background-color: var(--gray-light);
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        .product-price {
            margin-top: auto;
            font-size: 1.3rem;
            color: var(--primary-color);
            font-weight: bold;
        }

        /* Badge Gruppo Correlati */
        .group-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(231, 76, 60, 0.8); /* Rosso */
            color: white;
            font-size: 0.75rem;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <div id="sidebar">
        <div id="logo-container">
            <h1>PodoCatalogo Pro</h1>
            <p>Podopiù Database</p>
        </div>
        
        <input type="text" id="search-input" placeholder="Cerca codice o nome...">
        
        <div class="filter-group">
            <h3>Macro Categorie</h3>
            <div id="macro-filters">
                <button class="filter-btn active" data-filter="all">Tutti</button>
                </div>
        </div>

        <div class="filter-group">
            <h3>Categorie</h3>
            <div id="category-filters">
                </div>
        </div>
    </div>

    <div id="main-content">
        <div id="header">
            <h2>Elenco Prodotti</h2>
            <div id="product-count">Trovati: 0</div>
        </div>
        
        <div id="product-grid">
            </div>
    </div>

    <script>
        // --- CONFIGURAZIONE SUPABASE ---
        // INSERISCI QUI I TUOI DATI
        const SUPABASE_URL = "https://fxcuwfpdzymwkemzppgm.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable__jf5n22-ZlvGPRN-BAh38A_WdVt7B9d";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allProducts = [];
        let currentMacro = 'all';

        // --- INIZIALIZZAZIONE ---
        async function init() {
            await fetchProducts();
            populateFilters();
            renderGrid(allProducts);
            setupEventListeners();
        }

        // --- CARICAMENTO DATI ---
        async function fetchProducts() {
            const { data, error } = await supabase
                .from('prodotti_catalogo')
                .select('*');
            
            if (error) {
                console.error("Errore nel caricamento dei dati:", error);
                return;
            }
            allProducts = data;
        }

        // --- CREAZIONE CARD PRODOTTO (La Chicca!) ---
        function createProductCard(p) {
            const imgUrl = getImageUrl(p);
            
            return `
                <div class="product-card">
                    ${p.GRUPPO_CORRELATI ? `<div class="group-badge">GR ${p.GRUPPO_CORRELATI}</div>` : ''}
                    <div class="card-img-container">
                        <img src="${imgUrl}" alt="${p.NOME}" onerror="this.src='https://via.placeholder.com/300?text=Immagine+non+disponibile';">
                    </div>
                    <div class="card-body">
                        <div class="product-code">${p.CODICE || 'N/A'}</div>
                        <h3 class="product-name">${p.NOME || 'N/A'}</h3>
                        <div class="product-category">${p.CATEGORIE || 'Senza Categoria'}</div>
                        ${p.PREZZO ? `<div class="product-price">€ ${p.PREZZO.toFixed(2)}</div>` : ''}
                    </div>
                </div>
            `;
        }

        // --- LOGICA DELLE 3 PRIORITÀ (Intelligente) ---
        function getImageUrl(p) {
            // Priorità 1: Link dello Scraper
            if (p.IMG_SCRAPER && p.IMG_SCRAPER.startsWith('http')) {
                return p.IMG_SCRAPER;
            }
            
            // Priorità 2: Pagina Catalogo nel Bucket giusto
            if (p.MACROCATEGORIE && p.LINK_PAGINA_INTERA) {
                const bucket = getBucketName(p.MACROCATEGORIE);
                return `${SUPABASE_URL}/storage/v1/object/public/${bucket}/${p.LINK_PAGINA_INTERA}`;
            }
            
            // Priorità 3: Segnaposto
            return "https://via.placeholder.com/300?text=Immagine+non+disponibile";
        }

        // Associa Macrocategoria -> Bucket
        function getBucketName(macro) {
            switch(macro.toUpperCase()) {
                case 'ATTREZZATURE': return 'catalogo-attrezzature';
                case 'PRODOTTI': return 'catalogo-podopiu';
                case 'ORTOPODOLOGIA': return 'catalogo-orto';
                default: return 'catalogo-podopiu';
            }
        }

        // --- RENDER GRIGLIA ---
        function renderGrid(products) {
            const grid = document.getElementById('product-grid');
            const count = document.getElementById('product-count');
            
            grid.innerHTML = products.map(createProductCard).join('');
            count.innerText = `Trovati: ${products.length}`;
        }

        // --- POPOLAMENTO FILTRI DINAMICI ---
        function populateFilters() {
            // Macro
            const macros = [...new Set(allProducts.map(p => p.MACROCATEGORIE).filter(Boolean))];
            const macroFilters = document.getElementById('macro-filters');
            macros.forEach(macro => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.dataset.filter = macro;
                btn.innerText = macro;
                macroFilters.appendChild(btn);
            });

            // Categorie (dipendono dalla Macro selezionata)
            updateCategoryFilters('all');
        }

        function updateCategoryFilters(macro) {
            const categoryFilters = document.getElementById('category-filters');
            categoryFilters.innerHTML = ''; // Pulisce

            let filteredForMacro = allProducts;
            if (macro !== 'all') {
                filteredForMacro = allProducts.filter(p => p.MACROCATEGORIE === macro);
            }

            const categories = [...new Set(filteredForMacro.map(p => p.CATEGORIE).filter(Boolean))];
            categories.sort().forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.dataset.filter = cat;
                btn.innerText = cat;
                categoryFilters.appendChild(btn);
            });
        }

        // --- FILTRAGGIO E RICERCA IN TEMPO REALE ---
        function filterProducts() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const activeMacroBtn = document.querySelector('#macro-filters .filter-btn.active');
            const activeCatBtn = document.querySelector('#category-filters .filter-btn.active');
            
            const macro = activeMacroBtn ? activeMacroBtn.dataset.filter : 'all';
            const cat = activeCatBtn ? activeCatBtn.dataset.filter : 'all';

            let filtered = allProducts;

            // Filtro Macro
            if (macro !== 'all') filtered = filtered.filter(p => p.MACROCATEGORIE === macro);
            // Filtro Categoria
            if (cat !== 'all') filtered = filtered.filter(p => p.CATEGORIE === cat);
            
            // Ricerca Testo
            if (search) {
                filtered = filtered.filter(p => 
                    (p.NOME && p.NOME.toLowerCase().includes(search)) ||
                    (p.CODICE && p.CODICE.toLowerCase().includes(search))
                );
            }

            renderGrid(filtered);
        }

        // --- EVENT LISTENERS ---
        function setupEventListeners() {
            // Ricerca
            document.getElementById('search-input').addEventListener('input', filterProducts);

            // Clic filtri
            document.addEventListener('click', e => {
                if (e.target.classList.contains('filter-btn')) {
                    const parentId = e.target.parentElement.id;
                    const filterValue = e.target.dataset.filter;

                    // Pulisce gli attivi nel gruppo
                    e.target.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');

                    if (parentId === 'macro-filters') {
                        updateCategoryFilters(filterValue);
                        // Reset filtri categoria quando cambi macro
                        document.getElementById('category-filters').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    }
                    filterProducts();
                }
            });
        }

        // Via!
        init();

    </script>
</body>
</html>
