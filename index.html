<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PodoCatalogo Pro X - Podopiù</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css" />
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>
    
    <style>
        :root {
            --primary: #1a252f; /* Blu notte più profondo */
            --accent: #3498db; 
            --success: #27ae60;
            --bg: #f8fafc; /* Grigio chiarissimo più moderno */
            --card: #ffffff;
            --border: #e2e8f0;
            --text-main: #334155;
            --text-muted: #64748b;
        }

        body { font-family: 'Inter', 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text-main); }

        /* HEADER OTTIMIZZATO */
        #top-header {
            position: fixed; top: 0; left: 0; right: 0; height: 80px;
            background: var(--primary); color: white; display: flex;
            align-items: center; padding: 0 25px; z-index: 1000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            gap: 20px;
        }

        #search-input {
            flex-grow: 1; padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            outline: none; font-size: 0.95rem; max-width: 450px; background: rgba(255,255,255,0.05);
            color: white; transition: 0.3s;
        }
        #search-input:focus { background: rgba(255,255,255,0.15); border-color: var(--accent); }

        .nav-filters { display: flex; gap: 10px; flex-grow: 1; justify-content: center; overflow-x: auto; padding: 5px 0; }
        .nav-filters::-webkit-scrollbar { display: none; } /* Nasconde scrollbar filtri */

        .filter-btn {
            background: transparent; border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.8); padding: 8px 18px; border-radius: 25px; cursor: pointer;
            font-size: 0.85rem; transition: 0.3s; font-weight: 500; white-space: nowrap;
        }
        .filter-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3); }

        /* GRIGLIA PRODOTTI */
        #main-content { margin-top: 100px; padding: 25px; }
        #product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 35px; 
        }

        /* CARD "APPLE STYLE" */
        .product-card { 
            background: var(--card); 
            border-radius: 20px; /* Più arrotondato */
            overflow: hidden; 
            border: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            height: 100%;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            position: relative;
        }
        .product-card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            border-color: var(--accent);
        }
        .product-card.selected { border: 2px solid var(--success); background: #f0fff4; }
        
        .img-container { 
            width: 100%; height: 220px; background: white; 
            display: flex; align-items: center; justify-content: center; 
            padding: 15px; box-sizing: border-box;
            border-bottom: 1px solid #f1f5f9;
        }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .card-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        
        .prod-code { font-size: 0.75rem; color: var(--text-muted); font-weight: 700; letter-spacing: 0.5px; margin-bottom: 5px; }
        .prod-name { font-weight: 700; font-size: 0.95rem; line-height: 1.4; color: var(--primary); margin-bottom: 15px; height: 42px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        .action-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: auto; }

        .related-tag { 
            background: #e0f2fe; color: #0369a1; border: none;
            padding: 6px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 800;
            cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }
        .related-tag:hover { background: var(--accent); color: white; }

        .info-circle {
            background: #f1f5f9; color: var(--primary); border: none;
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .info-circle:hover { background: var(--primary); color: white; }

        .qta-area { 
            display: flex; align-items: center; justify-content: space-between; 
            margin-top: 15px; padding-top: 15px; border-top: 1px solid #f1f5f9;
        }
        .qta-input { 
            width: 50px; padding: 8px; border-radius: 8px; border: 1px solid var(--border); 
            text-align: center; font-weight: bold; color: var(--primary);
        }
        .add-btn { 
            background: var(--primary); color: white; border: none; padding: 10px 20px; 
            border-radius: 12px; cursor: pointer; font-size: 0.85rem; font-weight: 700;
            transition: 0.3s;
        }
        .add-btn:hover { background: var(--accent); transform: scale(1.05); }

        /* BADGE CARRELLO */
        .cart-info {
            cursor: pointer; background: rgba(255,255,255,0.1); padding: 10px 15px; 
            border-radius: 15px; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; gap: 8px;
        }
    </style>
</head>
<body>

<header id="top-header">
    <div id="client-name" style="font-weight: 800; font-size: 0.85rem; text-transform: uppercase; color: var(--accent);">Ciao!</div>
    <input type="text" id="search-input" placeholder="Cerca prodotto o codice...">
    
    <div class="nav-filters" id="macro-filters">
        <button class="filter-btn active" data-filter="all">Tutti</button>
    </div>

    <div style="display: flex; align-items: center; gap: 15px;">
        <div onclick="apriRiepilogo()" class="cart-info">
            <span>🛒</span> <span id="cart-count">0</span>
        </div>
        <button onclick="inviaRichiesta()" style="background:var(--success); color:white; border:none; padding:12px 20px; border-radius:15px; font-weight:800; cursor:pointer; font-size:0.85rem; box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3);">INVIA ORDINE</button>
    </div>
</header>

<div id="main-content">
    <div id="product-grid"></div>
</div>

<script>
    // --- STESSE COSTANTI E LOGICA DEL TUO FILE 83 ---
    const SB_URL = "https://fxcuwfpdzymwkemzppgm.supabase.co";
    const SB_KEY = "sb_publishable__jf5n22-ZlvGPRN-BAh38A_WdVt7B9d";
    const T_ID = "8604086640:AAEVbCc5RphJ09ngmW1-naxIXeahirKaGIA";
    const C_ID = "1068754998";
    
    const sb = supabase.createClient(SB_URL, SB_KEY);
    const slug = new URLSearchParams(window.location.search).get('c');
    let allProducts = [];
    let carrello = JSON.parse(localStorage.getItem('podo_cart_v1')) || {};
    let nomeCliente = "Utente";

    async function init() {
        if (slug) {
            const { data: contact } = await sb.from('contacts').select('nome').eq('slug', slug).maybeSingle();
            if (contact) { nomeCliente = contact.nome; document.getElementById('client-name').innerText = "Ciao " + nomeCliente; }
        }
        const { data } = await sb.from('prodotti_catalogo').select('*').order('NOME');
        allProducts = data || [];
        setupMacro();
        aggiornaConteggio();
        renderGrid(allProducts);
        Fancybox.bind("[data-fancybox]", {});
    }

    function getImageUrl(p, index = 0) {
        if (p.LINK_PAGINA_INTERA && Array.isArray(p.LINK_PAGINA_INTERA) && p.LINK_PAGINA_INTERA.length > 0) {
            let bucket = p.MACROCATEGORIE === 'ATTREZZATURE' ? 'catalogo-attrezzature' : 
                        (p.MACROCATEGORIE === 'ORTOPODOLOGIA' ? 'catalogo-orto' : 'catalogo-podopiu');
            return `${SB_URL}/storage/v1/object/public/${bucket}/${p.LINK_PAGINA_INTERA[index]}`;
        }
        return p.IMG_SCRAPER || "https://via.placeholder.com/300?text=No+Image";
    }

    function renderGrid(products) {
        const grid = document.getElementById('product-grid');
        const sValue = document.getElementById('search-input').value.trim().toLowerCase();
        
        let displayList = [];
        if (sValue.length > 0) {
            displayList = products; // Ricerca (es: Deneb) mostra tutto
        } else {
            const visti = new Set();
            displayList = products.filter(p => {
                if (!p.GRUPPO_CORRELATI || p.GRUPPO_CORRELATI === "null") return true;
                if (visti.has(p.GRUPPO_CORRELATI)) return false;
                visti.add(p.GRUPPO_CORRELATI);
                return true;
            });
        }

        grid.innerHTML = displayList.map(p => {
            const inCart = carrello[p.id];
            const hasCorr = p.GRUPPO_CORRELATI && p.GRUPPO_CORRELATI !== "null" &&
                           allProducts.filter(pr => pr.GRUPPO_CORRELATI === p.GRUPPO_CORRELATI).length > 1;
            
            return `
            <div class="product-card ${inCart ? 'selected' : ''}" id="card-${p.id}">
                <div class="img-container">
                    <a href="${getImageUrl(p)}" data-fancybox="gallery-${p.id}">
                        <img src="${getImageUrl(p)}" loading="lazy">
                    </a>
                </div>
                <div class="card-body">
                    <div class="prod-code">${p.CODICE || 'PODO-PROD'}</div>
                    <div class="prod-name">${p.NOME}</div>
                    
                    <div class="action-row">
                        ${hasCorr ? `<div class="related-tag" onclick="mostraCorrelati('${p.GRUPPO_CORRELATI}')">Varianti</div>` : '<span></span>'}
                        <button class="info-circle" onclick="mostraInfo('${p.id}')">i</button>
                    </div>
                    
                    <div class="qta-area">
                        <input type="number" id="qta-${p.id}" class="qta-input" value="${inCart ? inCart.qta : 1}" min="1">
                        <button class="add-btn" onclick="addToCart('${p.id}', '${p.NOME.replace(/'/g, "\\'")}')">
                            ${inCart ? 'Aggiorna' : 'Aggiungi'}
                        </button>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function setupMacro() {
        const macros = [...new Set(allProducts.map(p => p.MACROCATEGORIE).filter(Boolean))].sort();
        const container = document.getElementById('macro-filters');
        macros.forEach(m => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn'; btn.innerText = m;
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filterData();
            };
            container.appendChild(btn);
        });
    }

    function filterData() {
        const s = document.getElementById('search-input').value.toLowerCase();
        const m = document.querySelector('.filter-btn.active').innerText;
        const res = allProducts.filter(p => {
            const matchS = p.NOME.toLowerCase().includes(s) || (p.CODICE && p.CODICE.toLowerCase().includes(s));
            const matchM = (m === 'Tutti' || p.MACROCATEGORIE === m);
            return matchS && matchM;
        });
        renderGrid(res);
    }

    function mostraCorrelati(gruppo) {
        const listaReale = allProducts.filter(p => p.GRUPPO_CORRELATI === gruppo);
        let h = '<div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:15px; padding:10px;">';
        listaReale.forEach(p => {
            h += `<div style="border:1px solid #eee; padding:10px; border-radius:15px; text-align:center; background:#f9fafb;">
                <img src="${getImageUrl(p)}" style="width:100%; height:80px; object-fit:contain; margin-bottom:8px;">
                <div style="font-size:0.7rem; font-weight:bold; height:30px; overflow:hidden;">${p.NOME}</div>
                <button class="add-btn" style="width:100%; margin-top:8px; font-size:0.7rem;" onclick="addToCart('${p.id}', '${p.NOME.replace(/'/g, "\\'")}')">Scegli</button>
            </div>`;
        });
        Swal.fire({ title: 'Seleziona Variante', html: h + '</div>', width: '800px', showConfirmButton: false });
    }

    function mostraInfo(id) {
        const p = allProducts.find(item => item.id == id);
        Swal.fire({ 
            title: p.NOME, 
            html: `<div style="text-align:left; font-size:0.9rem; line-height:1.5;">${p.DESCRIZIONE_SCRAPER || 'Dettagli non disponibili.'}</div>`, 
            imageUrl: p.IMG_SCRAPER,
            imageHeight: 200,
            confirmButtonColor: '#1a252f'
        });
    }

    function addToCart(id, nome) {
        const qta = parseInt(document.getElementById(`qta-${id}`)?.value || 1);
        carrello[id] = { nome, qta };
        localStorage.setItem('podo_cart_v1', JSON.stringify(carrello));
        aggiornaConteggio(); renderGrid(allProducts);
        Swal.fire({ icon: 'success', title: 'Aggiunto!', timer: 600, showConfirmButton: false, position: 'top-end', toast: true });
    }

    function aggiornaConteggio() { document.getElementById('cart-count').innerText = Object.keys(carrello).length; }

    function apriRiepilogo() {
        let h = '<div style="text-align:left; max-height:400px; overflow-y:auto;">';
        const keys = Object.keys(carrello);
        if(!keys.length) h += '<p>Il carrello è vuoto.</p>';
        keys.forEach(id => {
            h += `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom:1px solid #f1f5f9; padding-bottom:8px;">
                <span style="font-size:0.85rem; font-weight:600;">${carrello[id].nome}</span>
                <div style="display:flex; align-items:center; gap:10px;">
                    <span style="background:#e2e8f0; padding:2px 8px; border-radius:5px; font-size:0.8rem;">x${carrello[id].qta}</span>
                    <button onclick="delItem('${id}')" style="color:#ef4444; border:none; background:none; cursor:pointer; font-size:1.1rem;">✖</button>
                </div>
            </div>`;
        });
        Swal.fire({ title: 'Il Tuo Ordine', html: h + '</div>', confirmButtonText: 'Chiudi', confirmButtonColor: '#1a252f' });
    }

    function delItem(id) { delete carrello[id]; localStorage.setItem('podo_cart_v1', JSON.stringify(carrello)); aggiornaConteggio(); renderGrid(allProducts); apriRiepilogo(); }

    async function inviaRichiesta() {
        const items = Object.values(carrello);
        if (items.length === 0) return Swal.fire("Carrello Vuoto", "Aggiungi prodotti prima di inviare", "info");
        let msg = `📄 ORDINE DA: ${nomeCliente.toUpperCase()}\n\n`;
        items.forEach(i => msg += `• ${i.nome} (Q.tà: ${i.qta})\n`);
        const res = await fetch(`https://api.telegram.org/bot${T_ID}/sendMessage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: C_ID, text: msg })
        });
        if (res.ok) { Swal.fire("Inviato!", "Il tuo ordine è stato ricevuto.", "success"); carrello = {}; localStorage.removeItem('podo_cart_v1'); aggiornaConteggio(); renderGrid(allProducts); }
    }

    document.getElementById('search-input').oninput = filterData;
    init();
</script>
</body>
</html>
