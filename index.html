<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PodoCatalogo Pro - Carrello & Zoom</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --success: #27ae60;
            --bg: #f4f7f6; --card: #ffffff; --gray: #ecf0f1;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; }

        /* --- SIDEBAR --- */
        #sidebar { width: 280px; background: var(--card); padding: 20px; border-right: 1px solid var(--gray); height: 100vh; position: sticky; top: 0; overflow-y: auto; }
        .filter-btn { width: 100%; background: none; border: 1px solid var(--gray); padding: 10px; border-radius: 8px; cursor: pointer; text-align: left; margin-bottom: 5px; }
        .filter-btn.active { background: var(--accent); color: white; }

        /* --- GRID --- */
        #main-content { flex: 1; padding: 30px; padding-bottom: 120px; }
        #product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }

        .product-card { background: var(--card); border-radius: 12px; overflow: hidden; transition: 0.3s; position: relative; border: 1px solid transparent; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-color: var(--accent); }
        
        .img-box { width: 100%; height: 200px; cursor: zoom-in; display: flex; align-items: center; justify-content: center; background: white; }
        .img-box img { max-width: 90%; max-height: 90%; object-fit: contain; }

        .card-body { padding: 15px; flex-grow: 1; }
        .p-name { font-weight: 600; margin: 0 0 10px 0; font-size: 0.95rem; height: 40px; overflow: hidden; }
        .add-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .add-btn:hover { background: var(--accent); }

        /* --- CARRELLO BAR --- */
        #cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-top: 3px solid var(--accent); }
        .checkout-btn { background: var(--success); color: white; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; }

        /* --- MODAL ZOOM --- */
        #zoom-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        #zoom-modal img { max-width: 90%; max-height: 90%; border-radius: 8px; box-shadow: 0 0 30px rgba(255,255,255,0.2); }
        #zoom-modal .close { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>PodoCatalogo</h2>
    <input type="text" id="search" placeholder="Cerca prodotto..." style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd; margin-bottom:20px;">
    <div id="macro-filters">
        <button class="filter-btn active" data-filter="all">Tutte le Macro</button>
    </div>
</div>

<div id="main-content">
    <div id="product-grid"></div>
</div>

<div id="cart-bar">
    <div>🛒 <span id="cart-count">0</span> articoli nel carrello</div>
    <button class="checkout-btn" onclick="inviaOrdine()">📦 Invia Richiesta Preventivo</button>
</div>

<div id="zoom-modal" onclick="this.style.display='none'">
    <span class="close">&times;</span>
    <img id="zoom-img" src="" alt="Zoom">
</div>

<script>
    const SB_URL = "https://fxcuwfpdzymwkemzppgm.supabase.co";
    const SB_KEY = "sb_publishable__jf5n22-ZlvGPRN-BAh38A_WdVt7B9d"; 
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let allProducts = [];
    let carrello = {};

    async function init() {
        const { data } = await sb.from('prodotti_catalogo').select('*');
        allProducts = data || [];
        
        // Popola Macro filtri
        const macros = [...new Set(allProducts.map(p => p.MACROCATEGORIE).filter(Boolean))];
        macros.forEach(m => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.dataset.filter = m;
            btn.innerText = m;
            document.getElementById('macro-filters').appendChild(btn);
        });

        renderGrid(allProducts);
    }

    function getImageUrl(p, full = false) {
        if (!full && p.IMG_SCRAPER) return p.IMG_SCRAPER;
        
        if (p.LINK_PAGINA_INTERA) {
            let bucket = 'catalogo-podopiu';
            if (p.MACROCATEGORIE === 'ATTREZZATURE') bucket = 'catalogo-attrezzature';
            if (p.MACROCATEGORIE === 'ORTOPODOLOGIA') bucket = 'catalogo-orto';
            return `${SB_URL}/storage/v1/object/public/${bucket}/${p.LINK_PAGINA_INTERA}`;
        }
        return "https://via.placeholder.com/400?text=Immagine+Assente";
    }

    function renderGrid(products) {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = products.map(p => `
            <div class="product-card">
                <div class="img-box" onclick="zoom('${getImageUrl(p, true)}')">
                    <img src="${getImageUrl(p)}" loading="lazy">
                </div>
                <div class="card-body">
                    <div style="font-size:0.7rem; color:var(--accent)">${p.CODICE}</div>
                    <p class="p-name">${p.NOME}</p>
                    <button class="add-btn" onclick="addToCart('${p.id}', '${p.NOME.replace(/'/g, "\\'")}')">
                        Aggiungi al Carrello
                    </button>
                </div>
            </div>
        `).join('');
    }

    function zoom(url) {
        document.getElementById('zoom-img').src = url;
        document.getElementById('zoom-modal').style.display = 'flex';
    }

    function addToCart(id, nome) {
        if (!carrello[id]) carrello[id] = { nome, qta: 1 };
        else carrello[id].qta++;
        
        aggiornaBarra();
        const btn = event.target;
        btn.innerText = "✅ Aggiunto!";
        btn.style.background = "#27ae60";
        setTimeout(() => { btn.innerText = "Aggiungi al Carrello"; btn.style.background = ""; }, 1000);
    }

    function aggiornaBarra() {
        const total = Object.values(carrello).reduce((acc, curr) => acc + curr.qta, 0);
        document.getElementById('cart-count').innerText = total;
    }

    function inviaOrdine() {
        const items = Object.values(carrello);
        if (items.length === 0) return Swal.fire("Carrello vuoto", "Scegli almeno un prodotto!", "warning");

        let messaggio = "Buongiorno Podopiù, vorrei richiedere un preventivo per:\n\n";
        items.forEach(i => messaggio += `• ${i.nome} (Q.tà: ${i.qta})\n`);
        messaggio += "\nAttendo vostra conferma. Grazie!";

        Swal.fire({
            title: 'Confermi l\'invio?',
            text: "Ti risponderemo il prima possibile!",
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'Sì, invia!',
            confirmButtonColor: '#27ae60'
        }).then((result) => {
            if (result.isConfirmed) {
                // Qui puoi collegare Telegram o WhatsApp
                const url = `https://wa.me/39XXXXXXXXXX?text=${encodeURIComponent(messaggio)}`;
                window.open(url, '_blank');
                
                Swal.fire('Inviato!', 'La tua richiesta è stata inoltrata con successo.', 'success');
                carrello = {};
                aggiornaBarra();
            }
        });
    }

    // Event Listeners per Filtri e Ricerca
    document.getElementById('search').addEventListener('input', e => {
        const val = e.target.value.toLowerCase();
        const filtered = allProducts.filter(p => p.NOME.toLowerCase().includes(val) || p.CODICE.toLowerCase().includes(val));
        renderGrid(filtered);
    });

    document.getElementById('macro-filters').addEventListener('click', e => {
        if (e.target.classList.contains('filter-btn')) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            const f = e.target.dataset.filter;
            const filtered = f === 'all' ? allProducts : allProducts.filter(p => p.MACROCATEGORIE === f);
            renderGrid(filtered);
        }
    });

    init();
</script>
</body>
</html>
