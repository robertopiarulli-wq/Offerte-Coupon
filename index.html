<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Richiesta Preventivo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; padding: 20px; padding-bottom: 100px; }
        .container { max-width: 800px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .card img { width: 100%; height: 150px; object-fit: contain; }
        .footer { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 20px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); text-align: center; }
        .btn { background: #0088cc; color: white; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="welcome">Caricamento...</h1>
        <div class="grid" id="product-list"></div>
    </div>

    <div class="footer">
        <button class="btn" onclick="inviaRichiesta()">🚀 Richiedi Preventivo</button>
    </div>

    <script>
        // CONFIGURAZIONE
        const URL = "https://fxcuwfpdzymwkemzppgm.supabase.co";
        const KEY = "sb_publishable__jf5n22-ZlvGPRN-BAh38A_WdVt7B9d"; 
        const supabase = window.supabase.createClient(URL, KEY);

        const params = new URLSearchParams(window.location.search);
        const slug = params.get('c');

        async function start() {
            // 1. Identifica il cliente dalla tabella contacts
            const { data: contact } = await supabase.from('contacts').select('nome').eq('slug', slug).single();
            document.getElementById('welcome').innerText = contact ? `Offerta per: ${contact.nome}` : "Benvenuto";

            // 2. Carica i prodotti
            const { data: prodotti } = await supabase.from('prodotti').select('*');
            const list = document.getElementById('product-list');
            prodotti.forEach(p => {
                list.innerHTML += `
                    <div class="card">
                        <img src="${p.immagine_url}">
                        <h4>${p.nome}</h4>
                        <input type="number" class="qta" data-nome="${p.nome}" min="0" value="0" style="width: 50px">
                    </div>`;
            });
        }

        async function inviaRichiesta() {
            const scelte = Array.from(document.querySelectorAll('.qta'))
                .filter(el => el.value > 0)
                .map(el => ({ articolo: el.dataset.nome, quantita: el.value }));

            if (scelte.length === 0) return alert("Seleziona almeno un prodotto!");

            const { error } = await supabase.from('richieste_preventivo').insert({
                contact_slug: slug,
                prodotti_scelti: scelte
            });

            if (!error) alert("Richiesta inviata con successo!");
        }

        start();
    </script>
</body>
</html>
