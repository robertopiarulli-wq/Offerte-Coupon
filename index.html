<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PodoCatalogo Pro - Podopiù</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --gray-light: #ecf0f1;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 280px;
            background-color: var(--card-bg);
            padding: 20px;
            border-right: 1px solid var(--gray-light);
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        #logo-container h1 { color: var(--primary-color); margin: 0; font-size: 1.5rem; }

        .filter-group { display: flex; flex-direction: column; gap: 10px; }
        .filter-group h3 { margin: 0; font-size: 1.1rem; color: var(--primary-color); }

        .filter-btn {
            background: none; border: 1px solid var(--gray-light); padding: 10px;
            border-radius: 8px; cursor: pointer; text-align: left; transition: var(--transition);
        }

        .filter-btn:hover, .filter-btn.active { background-color: var(--accent-color); color: white; border-color: var(--accent-color); }

        #search-input { padding: 12px; border: 1px solid var(--gray-light); border-radius: 8px; outline: none; }

        /* --- MAIN CONTENT --- */
        #main-content { flex: 1; padding: 30px; }
        #header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        /* --- GRID --- */
        #product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }

        .product-card {
            background-color: var(--card-bg); border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow: hidden;
            transition: var(--transition); position: relative;
            display: flex; flex-direction: column;
        }

        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid var(--accent-color); }

        .card-img-container { width: 100%; height: 250px; overflow: hidden; display: flex; align-items: center; justify-content: center; background: white; }
        .product-card img { max-width: 90%; max-height: 90%; object-fit: contain; transition: var(--transition); }
        .product-card:hover img { transform: scale(1.05); }

        .card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .product-code { font-size: 0.8rem; color: var(--accent-color); font-weight: bold; }
        .product-name { font-size: 1rem; color: var(--primary-color); margin: 0; font-weight: 600; }
        .product-category { font-size: 0.8rem; color: #7f8c8d; background: var(--gray-light); padding: 3px 8px; border-radius: 4px; align-self: flex-start; }

        .group-badge { position: absolute; top: 10px; right: 10px; background: #e74c3c; color: white; font-size: 0.7rem; padding: 4px 8px; border-radius: 12px; font-weight: bold; z-index: 2; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="logo-container">
            <h1>PodoCatalogo</h1>
            <p>Database Prodotti</p>
        </div>
        <input type="text" id="search-input" placeholder="Cerca codice o nome...">
        <div class="filter-group">
            <h3>Macro Categorie</h3>
            <div id="macro-filters">
                <button class="filter-btn active" data-filter="all">Tutti</button>
            </div>
        </div>
        <div class="filter-group">
            <h3>Categorie</h3>
            <div id="category-filters"></div>
        </div>
    </div>

    <div id="main-content">
        <div id="header">
            <h2>Catalogo</h2>
            <div id="product-count">Trovati: 0</div>
        </div>
        <div id="product-grid"></div>
    </div>

    <script>
        // --- CONFIGURAZIONE ---
        const SB_URL = "https://fxcuwfpdzymwkemzppgm.supabase.co"; 
        const SB_KEY = "sb_publishable__jf5n22-ZlvGPRN-BAh38A_WdVt7B9d"; // Incolla la tua Anon Key (Publishable)

        // Usiamo 'sb_client' per non andare in conflitto con l'oggetto 'supabase' della libreria
        const sb_client = supabase.createClient(SB_URL, SB_KEY);

        let allProducts = [];

        async function init() {
            console.log("Inizializzazione...");
            await fetchProducts();
            populateFilters();
            renderGrid(allProducts);
            setupEventListeners();
        }

        async function fetchProducts() {
            const { data, error } = await sb_client
                .from('prodotti_catalogo')
                .select('*');
            
            if (error) {
                console.error("Errore Supabase:", error);
                return;
            }
            allProducts = data || [];
            console.log("Prodotti caricati:", allProducts.length);
        }

        function getImageUrl(p) {
            // 1. Scraper
            if (p.IMG_SCRAPER && p.IMG_SCRAPER.startsWith('http')) return p.IMG_SCRAPER;
            
            // 2. Bucket Catalogo
            if (p.MACROCATEGORIE && p.LINK_PAGINA_INTERA) {
                let bucket = 'catalogo-podopiu';
                const macro = p.MACROCATEGORIE.toUpperCase();
                if (macro === 'ATTREZZATURE') bucket = 'catalogo-attrezzature';
                if (macro === 'ORTOPODOLOGIA') bucket = 'catalogo-orto';
                
                return `${SB_URL}/storage/v1/object/public/${bucket}/${p.LINK_PAGINA_INTERA}`;
            }
            return "https://via.placeholder.com/300?text=Immagine+non+disponibile";
        }

        function createCard(p) {
            return `
                <div class="product-card">
                    ${p.GRUPPO_CORRELATI ? `<div class="group-badge">GR ${p.GRUPPO_CORRELATI}</div>` : ''}
                    <div class="card-img-container">
                        <img src="${getImageUrl(p)}" loading="lazy" onerror="this.src='https://via.placeholder.com/300?text=Immagine+non+disponibile';">
                    </div>
                    <div class="card-body">
                        <div class="product-code">${p.CODICE || ''}</div>
                        <h3 class="product-name">${p.NOME || 'Senza Nome'}</h3>
                        <div class="product-category">${p.CATEGORIE || ''}</div>
                    </div>
                </div>
            `;
        }

        function renderGrid(products) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(createCard).join('');
            document.getElementById('product-count').innerText = `Trovati: ${products.length}`;
        }

        function populateFilters() {
            const macros = [...new Set(allProducts.map(p => p.MACROCATEGORIE).filter(Boolean))];
            const container = document.getElementById('macro-filters');
            macros.forEach(m => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.dataset.filter = m;
                btn.innerText = m;
                container.appendChild(btn);
            });
            updateCategoryFilters('all');
        }

        function updateCategoryFilters(macro) {
            const container = document.getElementById('category-filters');
            container.innerHTML = '';
            const filtered = macro === 'all' ? allProducts : allProducts.filter(p => p.MACROCATEGORIE === macro);
            const cats = [...new Set(filtered.map(p => p.CATEGORIE).filter(Boolean))].sort();
            cats.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.dataset.filter = c;
                btn.innerText = c;
                container.appendChild(btn);
            });
        }

        function filterProducts() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const macro = document.querySelector('#macro-filters .active').dataset.filter;
            const catBtn = document.querySelector('#category-filters .active');
            const cat = catBtn ? catBtn.dataset.filter : 'all';

            let filtered = allProducts;
            if (macro !== 'all') filtered = filtered.filter(p => p.MACROCATEGORIE === macro);
            if (cat !== 'all') filtered = filtered.filter(p => p.CATEGORIE === cat);
            if (search) {
                filtered = filtered.filter(p => 
                    (p.NOME && p.NOME.toLowerCase().includes(search)) || 
                    (p.CODICE && p.CODICE.toLowerCase().includes(search))
                );
            }
            renderGrid(filtered);
        }

        function setupEventListeners() {
            document.getElementById('search-input').addEventListener('input', filterProducts);
            document.addEventListener('click', e => {
                if (e.target.classList.contains('filter-btn')) {
                    e.target.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    if (e.target.parentElement.id === 'macro-filters') updateCategoryFilters(e.target.dataset.filter);
                    filterProducts();
                }
            });
        }

        init();
    </script>
</body>
</html>
