<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PodoCatalogo Pro X - Preventivi</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --success: #28a745;
            --bg: #f8f9fa; --card: #ffffff; --border: #d1d8e0;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; color: var(--primary); }

        /* --- SIDEBAR FISSA --- */
        #sidebar { 
            width: 320px; background: var(--card); border-right: 2px solid var(--border);
            height: 100vh; position: fixed; left: 0; top: 0; 
            display: flex; flex-direction: column; z-index: 1000;
        }
        
        .sidebar-header { padding: 20px; background: var(--primary); color: white; }
        .sidebar-content { padding: 20px; overflow-y: auto; flex-grow: 1; padding-bottom: 100px; }

        .search-container { position: sticky; top: 0; background: var(--card); padding-bottom: 15px; z-index: 10; }
        #search-input { width: 100%; padding: 12px; border: 2px solid var(--accent); border-radius: 8px; font-size: 1rem; outline: none; box-sizing: border-box; }

        .filter-group h3 { font-size: 0.9rem; text-transform: uppercase; color: #7f8c8d; margin: 20px 0 10px; }
        .filter-btn { width: 100%; background: #fff; border: 1px solid var(--border); padding: 12px; border-radius: 8px; cursor: pointer; text-align: left; margin-bottom: 6px; font-weight: 500; }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* --- MAIN CONTENT --- */
        #main-content { flex: 1; margin-left: 320px; padding: 30px; min-height: 100vh; padding-bottom: 120px; }
        #product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        /* --- CARD POTENZIATA --- */
        .product-card { 
            background: var(--card); border-radius: 12px; overflow: hidden; 
            border: 1px solid var(--border); display: flex; flex-direction: column; 
            transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative;
        }
        .product-card.selected { border: 2px solid var(--success); background: #f0fff4; }
        
        .img-container { 
            width: 100%; height: 230px; background: white; display: flex; align-items: center; 
            justify-content: center; cursor: zoom-in;
        }
        .img-container img { max-width: 90%; max-height: 90%; object-fit: contain; filter: grayscale(100%); transition: 0.4s; }
        .product-card:hover img { filter: grayscale(0%); }

        .card-body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .p-name { font-weight: 600; font-size: 0.95rem; margin: 5px 0 10px 0; height: 45px; overflow: hidden; line-height: 1.4; }
        
        /* PULSANTE VEDI CORRELATI */
        .related-btn {
            background: none; border: 1px solid var(--accent); color: var(--accent);
            padding: 5px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold;
            cursor: pointer; align-self: flex-start; margin-bottom: 10px; transition: 0.2s;
        }
        .related-btn:hover { background: var(--accent); color: white; }

        .qta-area { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 15px; border-top: 1px solid #eee; }
        .qta-input { width: 70px; padding: 8px; border: 2px solid var(--primary); border-radius: 8px; text-align: center; font-weight: bold; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* --- BARRA SOTTO --- */
        #cart-bar { 
            position: fixed; bottom: 0; left: 320px; right: 0; background: #fff; 
            padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1); border-top: 4px solid var(--success); z-index: 1001;
        }
        .send-btn { background: var(--success); color: white; border: none; padding: 15px 45px; border-radius: 50px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }

        /* --- ZOOM MODAL PULSANTE --- */
        #zoom-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; cursor: pointer; }
        
        #zoom-img { 
            max-width: 90%; max-height: 90%; object-fit: contain; 
            border: 3px solid #333; border-radius: 8px;
            animation: pulse-border 2s infinite; /* Effetto pulsante */
        }
        
        .close-zoom { position: absolute; top: 20px; right: 20px; color: white; font-size: 50px; cursor: pointer; z-index: 2001; }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        /* --- POPUP CORRELATI --- */
        #related-popup-container { max-height: 80vh; overflow-y: auto; text-align: left; }
        .related-item-row { display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; }
        .related-item-img { width: 60px; height: 60px; object-fit: contain; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; height: auto; position: relative; }
            #main-content { margin-left: 0; }
            #cart-bar { left: 0; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <h2 id="client-name" style="margin:0; font-size: 1.2rem;">PodoCatalogo</h2>
    </div>
    <div class="sidebar-content">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="🔍 Cerca prodotto o codice...">
        </div>
        <div class="filter-group">
            <h3>Macro Categorie</h3>
            <div id="macro-filters"><button class="filter-btn active" data-filter="all">Tutte le Macro</button></div>
        </div>
        <div class="filter-group">
            <h3>Sottocategorie</h3>
            <div id="sub-filters"></div>
        </div>
    </div>
</div>

<div id="main-content">
    <div id="product-grid"></div>
</div>

<div id="cart-bar">
    <div style="font-size: 1.1rem; font-weight: bold; cursor:pointer" onclick="apriRiepilogo()">
        🛒 Articoli: <span id="cart-count">0</span> (Vedi/Modifica)
    </div>
    <button class="send-btn" onclick="inviaRichiesta()">🚀 INVIA PREVENTIVO</button>
</div>

<div id="zoom-modal" onclick="this.style.display='none'">
    <span class="close-zoom">&times;</span>
    <img id="zoom-img" src="">
</div>

<script>
    const SB_URL = "https://fxcuwfpdzymwkemzppgm.supabase.co";
    const SB_KEY = "sb_publishable__jf5n22-ZlvGPRN-BAh38A_WdVt7B9d";
    const T_ID = "8604086640:AAEVbCc5RphJ09ngmW1-naxIXeahirKaGIA";
    const C_ID = "1068754998";
    
    const sb = supabase.createClient(SB_URL, SB_KEY);
    const slug = new URLSearchParams(window.location.search).get('c');
    let allProducts = [];
    let carrello = JSON.parse(localStorage.getItem('podo_cart_v1')) || {};
    let nomeCliente = "Anonimo";

    async function init() {
        // Recupero nome cliente e prodotti (intatto)
        if (slug) {
            const { data: contact } = await sb.from('contacts').select('nome').eq('slug', slug).single();
            if (contact) { nomeCliente = contact.nome; document.getElementById('client-name').innerText = "Per: " + nomeCliente; }
        }
        const { data } = await sb.from('prodotti_catalogo').select('*').order('NOME');
        allProducts = data || [];
        
        setupMacro();
        aggiornaConteggio();
        renderGrid(allProducts);
    }

    function renderGrid(products) {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = products.map(p => {
            const inCart = carrello[p.id];
            const correlati = p.GRUPPO_CORRELATI ? allProducts.filter(pr => pr.GRUPPO_CORRELATI === p.GRUPPO_CORRELATI && pr.id !== p.id) : [];
            
            return `
            <div class="product-card ${inCart ? 'selected' : ''}" id="card-${p.id}">
                <div class="img-container" onclick="zoom('${getImageUrl(p, true)}')">
                    <img src="${getImageUrl(p)}" loading="lazy">
                </div>
                <div class="card-body">
                    <div style="font-size:0.75rem; color:var(--accent); font-weight:bold">${p.CODICE || '---'}</div>
                    <p class="p-name">${p.NOME}</p>
                    
                    ${correlati.length > 0 ? `<button class="related-btn" onclick="mostraCorrelati('${p.GRUPPO_CORRELATI}', '${p.NOME.replace(/'/g, "\\'")}')">Vedi Correlati (+${correlati.length})</button>` : ''}

                    <div class="qta-area">
                        <input type="number" id="qta-${p.id}" class="qta-input" value="${inCart ? inCart.qta : 1}" min="1">
                        <button class="add-btn" onclick="addToCart('${p.id}', '${p.NOME.replace(/'/g, "\\'")}')">
                            ${inCart ? 'AGGIORNATO' : 'AGGIUNGI'}
                        </button>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    // --- FUNZIONE PER MOSTRARE I CORRELATI IN POPUP ---
    function mostraCorrelati(gruppo, nomeProdottoOriginale) {
        const correlati = allProducts.filter(p => p.GRUPPO_CORRELATI === gruppo);
        
        let html = '<div id="related-popup-container">';
        html += `<p style="font-size:0.9rem; color:#7f8c8d; margin-bottom:15px;">Prodotti correlati a: <strong>${nomeProdottoOriginale}</strong></p>`;
        
        correlati.forEach(p => {
            const inCart = carrello[p.id];
            html += `
            <div class="related-item-row ${inCart ? 'selected' : ''}" id="rel-card-${p.id}">
                <img src="${getImageUrl(p)}" class="related-item-img">
                <div style="flex:1">
                    <div style="font-size:0.7rem; color:var(--accent); font-weight:bold;">${p.CODICE || '---'}</div>
                    <p style="font-size:0.85rem; margin:2px 0;">${p.NOME}</p>
                </div>
                <div style="display:flex; align-items:center; gap:5px;">
                    <input type="number" id="rel-qta-${p.id}" value="${inCart ? inCart.qta : 1}" min="1" style="width:40px; text-align:center;">
                    <button class="add-btn" style="padding:5px 10px; font-size:0.8rem;" onclick="addToCartFromRelated('${p.id}', '${p.NOME.replace(/'/g, "\\'")}')">
                        ${inCart ? 'OK' : 'AGGIUNGI'}
                    </button>
                </div>
            </div>`;
        });
        html += '</div>';

        Swal.fire({
            title: 'Prodotti del Gruppo ' + gruppo,
            html: html,
            confirmButtonText: 'Torna al Catalogo',
            confirmButtonColor: '#2c3e50',
            width: '600px'
        });
    }

    // Aggiunta specifica dal popup dei correlati
    function addToCartFromRelated(id, nome) {
        const qta = parseInt(document.getElementById(`rel-qta-${id}`).value);
        addToCart(id, nome, false); // false per non mostrare il Swal verde qui
        
        // Aggiorna l'area dei correlati visivamente
        document.getElementById(`rel-card-${id}`).classList.add('selected');
        event.target.innerText = 'OK';
        
        // Sincronizza il grid principale se il prodotto è visibile
        const mainCard = document.getElementById(`card-${id}`);
        if(mainCard) {
            mainCard.classList.add('selected');
            document.getElementById(`qta-${id}`).value = qta;
        }
    }

    // --- ZOOM MODAL PULSANTE (Blindato e Funzionante anche su Mobile) ---
    function zoom(url) { 
        document.getElementById('zoom-img').src = url; 
        const modal = document.getElementById('zoom-modal');
        modal.style.display = 'flex'; 
        
        // Aggiungiamo il listener per chiudere cliccando ovunque
        modal.onclick = function(e) {
            if (e.target !== document.getElementById('zoom-img')) {
                modal.style.display = 'none';
            }
        };
    }

    // --- FUNZIONI CARRELLO (Intatte e Funzionanti) ---
    function addToCart(id, nome, showSwal = true) {
        const qtaField = document.getElementById(`qta-${id}`) || document.getElementById(`rel-qta-${id}`);
        const qta = parseInt(qtaField.value);
        if(qta > 0) {
            carrello[id] = { nome, qta };
            const card = document.getElementById(`card-${id}`);
            if(card) card.classList.add('selected');
        } else {
            delete carrello[id];
            const card = document.getElementById(`card-${id}`);
            if(card) card.classList.remove('selected');
        }
        localStorage.setItem('podo_cart_v1', JSON.stringify(carrello));
        aggiornaConteggio();
        if(showSwal) Swal.fire({ title: 'Carrello aggiornato', icon: 'success', timer: 700, showConfirmButton: false });
    }

    function apriRiepilogo() {
        let html = '<div style="text-align:left; max-height:300px; overflow-y:auto;">';
        const items = Object.keys(carrello);
        if(items.length === 0) html += "<p>Il carrello è vuoto</p>";
        items.forEach(id => {
            html += `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">
                <span style="font-size:0.8rem; flex:1;">${carrello[id].nome}</span>
                <input type="number" value="${carrello[id].qta}" style="width:50px;" onchange="updateQtaDirect('${id}', this.value)">
                <button onclick="updateQtaDirect('${id}', 0); apriRiepilogo();" style="border:none; background:none; color:red; cursor:pointer; margin-left:10px;">✖</button>
            </div>`;
        });
        html += '</div>';
        Swal.fire({ title: 'Il tuo Carrello', html: html, confirmButtonText: 'Chiudi' });
    }

    function updateQtaDirect(id, qta) {
        qta = parseInt(qta);
        if(qta <= 0) delete carrello[id];
        else carrello[id].qta = qta;
        localStorage.setItem('podo_cart_v1', JSON.stringify(carrello));
        aggiornaConteggio();
        renderGrid(allProducts);
    }

    async function inviaRichiesta() {
        const items = Object.values(carrello);
        if (items.length === 0) return Swal.fire("Carrello Vuoto", "", "info");

        let msg = `📄 PREVENTIVO PER: ${nomeCliente.toUpperCase()}\n`;
        msg += `🔗 Link Contatto: ${slug || 'N/A'}\n\n`;
        items.forEach(i => msg += `• ${i.nome} (Q.tà: ${i.qta})\n`);
        
        Swal.fire({ title: 'Invio...', didOpen: () => Swal.showLoading() });

        const res = await fetch(`https://api.telegram.org/bot${T_ID}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: C_ID, text: msg })
        });

        if (res.ok) {
            Swal.fire("Inviato!", "Riceverai una risposta a breve.", "success");
            carrello = {}; localStorage.removeItem('podo_cart_v1'); aggiornaConteggio(); renderGrid(allProducts);
        }
    }

    // --- LOGICHE FILTRI E IMMAGINI (Intatte) ---
    function getImageUrl(p, full = false) {
        if (!full && p.IMG_SCRAPER) return p.IMG_SCRAPER;
        if (p.LINK_PAGINA_INTERA) {
            let b = p.MACROCATEGORIE === 'ATTREZZATURE' ? 'catalogo-attrezzature' : 
                    (p.MACROCATEGORIE === 'ORTOPODOLOGIA' ? 'catalogo-orto' : 'catalogo-podopiu');
            return `${SB_URL}/storage/v1/object/public/${b}/${p.LINK_PAGINA_INTERA}`;
        }
        return "https://via.placeholder.com/300?text=Foto+Assente";
    }

    function setupMacro() {
        const macros = [...new Set(allProducts.map(p => p.MACROCATEGORIE).filter(Boolean))];
        const container = document.getElementById('macro-filters');
        macros.forEach(m => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.dataset.filter = m;
            btn.innerText = m;
            container.appendChild(btn);
        });
        updateSub('all');
    }

    function updateSub(macro) {
        const container = document.getElementById('sub-filters');
        container.innerHTML = '<button class="filter-btn active" data-filter="all">Tutte le Sotto</button>';
        const filtered = macro === 'all' ? allProducts : allProducts.filter(p => p.MACROCATEGORIE === macro);
        const subs = [...new Set(filtered.map(p => p.CATEGORIE).filter(Boolean))].sort();
        subs.forEach(s => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.dataset.filter = s;
            btn.innerText = s;
            container.appendChild(btn);
        });
    }

    function aggiornaConteggio() { document.getElementById('cart-count').innerText = Object.keys(carrello).length; }

    document.getElementById('search-input').addEventListener('input', e => {
        const t = e.target.value.toLowerCase();
        renderGrid(allProducts.filter(p => p.NOME.toLowerCase().includes(t) || p.CODICE?.toLowerCase().includes(t)));
    });

    document.addEventListener('click', e => {
        if (e.target.classList.contains('filter-btn')) {
            const group = e.target.parentElement.id;
            e.target.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            const macro = document.querySelector('#macro-filters .active').dataset.filter;
            if (group === 'macro-filters') updateSub(macro);
            const sub = document.querySelector('#sub-filters .active')?.dataset.filter || 'all';
            let filtered = macro === 'all' ? allProducts : allProducts.filter(p => p.MACROCATEGORIE === macro);
            if (sub !== 'all') filtered = filtered.filter(p => p.CATEGORIE === sub);
            renderGrid(filtered);
        }
    });

    init();
</script>
</body>
</html>
