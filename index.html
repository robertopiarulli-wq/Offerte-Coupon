<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Richiesta Preventivo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; padding: 20px; padding-bottom: 100px; }
        .container { max-width: 900px; margin: auto; }
        .category-header { grid-column: 1/-1; background: #0088cc; color: white; padding: 10px 20px; border-radius: 8px; margin-top: 30px; font-size: 1.2em; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: space-between; }
        .card img { width: 100%; height: 160px; object-fit: contain; margin-bottom: 10px; }
        .card h4 { margin: 10px 0 5px 0; font-size: 1em; color: #333; }
        .card .code { font-size: 0.75em; color: #888; margin-bottom: 5px; font-weight: bold; }
        .card .desc { font-size: 0.85em; color: #666; margin-bottom: 15px; height: 35px; overflow: hidden; }
        .footer { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); text-align: center; z-index: 100; }
        .btn { background: #28a745; color: white; border: none; padding: 12px 40px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 1.1em; transition: 0.3s; }
        .btn:hover { background: #218838; transform: scale(1.05); }
        .qta-input { width: 60px; padding: 5px; border: 1px solid #ccc; border-radius: 5px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="welcome">Caricamento in corso...</h1>
        <div class="grid" id="product-list"></div>
    </div>

    <div class="footer">
        <button class="btn" onclick="inviaRichiesta()">🚀 Invia Richiesta Preventivo</button>
    </div>

    <script>
        // CONFIGURAZIONE - Nota: variabile rinominata in 'sb' per evitare conflitti
        const URL_SB = "https://fxcuwfpdzymwkemzppgm.supabase.co";
        const KEY_SB = "sb_publishable__jf5n22-ZlvGPRN-BAh38A_WdVt7B9d"; 
        const sb = window.supabase.createClient(URL_SB, KEY_SB);

        const params = new URLSearchParams(window.location.search);
        const slug = params.get('c');

        async function start() {
            if (!slug) {
                document.getElementById('welcome').innerText = "Benvenuto nel Catalogo";
            } else {
                // 1. Identifica il cliente
                const { data: contact } = await sb.from('contacts').select('nome').eq('slug', slug).single();
                document.getElementById('welcome').innerText = contact ? `Offerta Personalizzata per: ${contact.nome}` : "Benvenuto";
            }

            // 2. Carica i prodotti ordinati per categoria
            const { data: prodotti, error } = await sb.from('prodotti').select('*').order('categoria');
            
            if (error) {
                console.error("Errore caricamento:", error);
                return;
            }

            const list = document.getElementById('product-list');
            let ultimaCategoria = "";

            prodotti.forEach(p => {
                // Aggiungi intestazione categoria se cambia
                if (p.categoria !== ultimaCategoria) {
                    const catDiv = document.createElement('div');
                    catDiv.className = 'category-header';
                    catDiv.innerText = p.categoria;
                    list.appendChild(catDiv);
                    ultimaCategoria = p.categoria;
                }

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div>
                        <img src="${p.immagine_url || 'https://via.placeholder.com/150'}" onerror="this.src='https://via.placeholder.com/150'">
                        <div class="code">Cod: ${p.codice}</div>
                        <h4>${p.nome}</h4>
                        <div class="desc">${p.descrizione || ''}</div>
                    </div>
                    <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 10px;">
                        <span style="font-size: 0.9em;">Quantità:</span>
                        <input type="number" class="qta" data-nome="${p.nome}" data-codice="${p.codice}" min="0" value="0" class="qta-input" style="width: 50px;">
                    </div>
                `;
                list.appendChild(card);
            });
        }

        async function inviaRichiesta() {
            const scelte = Array.from(document.querySelectorAll('.qta'))
                .filter(el => parseInt(el.value) > 0)
                .map(el => ({ 
                    codice: el.dataset.codice, 
                    articolo: el.dataset.nome, 
                    quantita: el.value 
                }));

            if (scelte.length === 0) return alert("Seleziona almeno un prodotto per il preventivo!");

            const { error } = await sb.from('richieste_preventivo').insert({
                contact_slug: slug || "anonimo",
                prodotti_scelti: scelte
            });

            if (!error) {
                alert("Ottimo! La tua richiesta è stata inviata. Ti ricontatteremo a breve.");
                // Reset quantità
                document.querySelectorAll('.qta').forEach(el => el.value = 0);
            } else {
                alert("Errore nell'invio. Riprova tra poco.");
            }
        }

        start();
    </script>
</body>
</html>
